<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breast Cancer Assistant | مساعد سرطان الثدي</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #17171e;
    --surface2: #1e1e28;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --accent: #e05c8a;
    --accent2: #c94d7a;
    --accent-soft: rgba(224,92,138,0.12);
    --accent-glow: rgba(224,92,138,0.25);
    --teal: #4ecdc4;
    --text: #f0eff4;
    --text2: #9b9aaa;
    --text3: #5a5968;
    --font-ar: 'IBM Plex Sans Arabic', sans-serif;
    --font-en: 'DM Sans', sans-serif;
    --radius: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-en);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(224,92,138,0.06) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  header {
    position: relative; z-index: 10;
    background: rgba(15,15,19,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo-ring {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b3fa0);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 0 20px var(--accent-glow); flex-shrink: 0;
  }
  .header-info h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .header-info p  { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .status-dot {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--teal);
  }
  .status-dot::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--teal); animation: pdot 2s ease-in-out infinite;
  }
  @keyframes pdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .lang-toggle {
    display: flex; gap: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 3px; margin-left: 12px;
  }
  .lang-btn {
    padding: 4px 10px; border-radius: 7px;
    font-size: 11px; font-weight: 500;
    border: none; cursor: pointer;
    background: transparent; color: var(--text2); transition: all .2s;
  }
  .lang-btn.active { background: var(--accent); color: #fff; }
  #chat {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto;
    padding: 24px 20px 16px;
    display: flex; flex-direction: column; gap: 20px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .welcome {
    display: flex; flex-direction: column; align-items: center;
    text-align: center; padding: 30px 20px 10px; gap: 16px;
  }
  .welcome-icon {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #8b3fa0);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; box-shadow: 0 0 40px var(--accent-glow);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .welcome h2 { font-size: 20px; font-weight: 600; }
  .welcome p  { font-size: 13px; color: var(--text2); max-width: 340px; line-height: 1.7; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .chip {
    padding: 8px 14px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 50px; font-size: 12px; color: var(--text2);
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .chip:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .chip.ar { font-family: var(--font-ar); }
  .msg-wrap { display: flex; gap: 10px; animation: rise .25s ease; }
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .msg-wrap.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 14px; align-self: flex-end;
  }
  .msg-wrap.user .avatar { background: linear-gradient(135deg, var(--accent), #8b3fa0); }
  .msg-wrap.bot  .avatar { background: var(--surface2); border: 1px solid var(--border2); }
  .bubble-col { display: flex; flex-direction: column; gap: 4px; max-width: 78%; }
  .msg-wrap.user .bubble-col { align-items: flex-end; }
  .bubble {
    padding: 12px 16px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.75; word-break: break-word;
  }
  .msg-wrap.user .bubble {
    background: linear-gradient(135deg, var(--accent), #c94d7a);
    color: #fff; border-bottom-right-radius: 6px;
  }
  .msg-wrap.bot .bubble {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text); border-bottom-left-radius: 6px;
  }
  .bubble.ar { font-family: var(--font-ar); direction: rtl; text-align: right; }
  .bubble.en { font-family: var(--font-en); direction: ltr; text-align: left; }
  .bubble ul { padding-left: 18px; margin: 6px 0; }
  .bubble ul.ar { padding-right: 18px; padding-left: 0; }
  .bubble li { margin: 4px 0; }
  .bubble strong { color: var(--accent); font-weight: 600; }
  .bubble a { color: var(--teal); font-size: 12px; }
  .typing-dots {
    display: flex; gap: 4px; padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius); border-bottom-left-radius: 6px;
  }
  .typing-dots span {
    width: 7px; height: 7px; background: var(--text3);
    border-radius: 50%; animation: bounce .9s infinite;
  }
  .typing-dots span:nth-child(2){animation-delay:.15s}
  .typing-dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
  .cursor{animation:blink .6s steps(1) infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .suggestions-row {
    display: flex; flex-wrap: wrap; gap: 6px; padding-left: 42px;
    animation: rise .3s ease .1s both;
  }
  .suggestions-row.ar { padding-left: 0; padding-right: 42px; }
  .sug-btn {
    padding: 6px 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 50px; font-size: 11px; color: var(--text2);
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .sug-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .sug-btn.ar { font-family: var(--font-ar); }
  #input-area {
    position: relative; z-index: 10;
    background: rgba(15,15,19,0.97);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    padding: 14px 16px; flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 10px 12px; transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  #user-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px; font-family: var(--font-en);
    resize: none; min-height: 22px; max-height: 120px; line-height: 1.5;
  }
  #user-input.ar { font-family: var(--font-ar); direction: rtl; text-align: right; }
  #user-input::placeholder { color: var(--text3); }
  #send-btn {
    width: 36px; height: 36px; flex-shrink: 0; border-radius: 50%;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; box-shadow: 0 0 12px var(--accent-glow);
  }
  #send-btn:hover { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active { transform: scale(.95); }
  #send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
  #send-btn svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .input-hint { text-align: center; font-size: 10px; color: var(--text3); margin-top: 8px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-ring">🎗</div>
    <div class="header-info">
      <h1>Breast Cancer Assistant</h1>
      <p>مساعد سرطان الثدي · AI Powered</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="status-dot">Online</div>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="btn-ar" onclick="setLang('ar')">عر</button>
    </div>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🎗</div>
    <h2 id="w-title">Breast Cancer Assistant</h2>
    <p id="w-sub">Ask me anything about breast cancer in Arabic or English — symptoms, diagnosis, treatment, and more.</p>
    <div class="chips" id="chips">
      <button class="chip" onclick="sendChip(this)">What is breast cancer?</button>
      <button class="chip" onclick="sendChip(this)">What are the symptoms?</button>
      <button class="chip" onclick="sendChip(this)">How is it treated?</button>
      <button class="chip" onclick="sendChip(this)">Survival rates?</button>
      <button class="chip ar" onclick="sendChip(this)">ما هو سرطان الثدي؟</button>
      <button class="chip ar" onclick="sendChip(this)">ما هي الأعراض؟</button>
      <button class="chip ar" onclick="sendChip(this)">كيف يتم العلاج؟</button>
      <button class="chip ar" onclick="sendChip(this)">ما معدلات البقاء؟</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask in English or Arabic... اكتب سؤالك هنا"></textarea>
    <button id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="input-hint" id="hint">Press Enter to send · اضغط Enter للإرسال</div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let currentLang = 'en';
  let conversationHistory = [];
  let isStreaming = false;

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
    if (lang === 'ar') {
      document.getElementById('w-title').textContent = 'مساعد سرطان الثدي';
      document.getElementById('w-sub').textContent = 'اسألني أي شيء عن سرطان الثدي بالعربي أو الإنجليزي.';
      input.placeholder = 'اكتب سؤالك هنا... Ask in English or Arabic';
      input.classList.add('ar');
      document.getElementById('hint').textContent = 'اضغط Enter للإرسال';
    } else {
      document.getElementById('w-title').textContent = 'Breast Cancer Assistant';
      document.getElementById('w-sub').textContent = 'Ask me anything about breast cancer in Arabic or English.';
      input.placeholder = 'Ask in English or Arabic... اكتب سؤالك هنا';
      input.classList.remove('ar');
      document.getElementById('hint').textContent = 'Press Enter to send · اضغط Enter للإرسال';
    }
  }

  function detectLang(text) {
    const ar = (text.match(/[\u0600-\u06FF]/g) || []).length;
    return ar > text.length * 0.2 ? 'ar' : 'en';
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    sendBtn.disabled = !input.value.trim() || isStreaming;
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming && input.value.trim()) sendMessage();
    }
  });

  function sendChip(btn) {
    input.value = btn.textContent.trim();
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function appendUser(text) {
    hideWelcome();
    const lang = detectLang(text);
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap user';
    wrap.innerHTML = `<div class="avatar">👤</div><div class="bubble-col"><div class="bubble ${lang}">${esc(text)}</div></div>`;
    chat.appendChild(wrap);
    scrollDown();
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap bot';
    wrap.id = 'typing-wrap';
    wrap.innerHTML = `<div class="avatar">🎗</div><div class="bubble-col"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    chat.appendChild(wrap);
    scrollDown();
  }

  function removeTyping() {
    const t = document.getElementById('typing-wrap');
    if (t) t.remove();
  }

  function appendBotStream(lang) {
    const wrap = document.createElement('div');
    wrap.className = 'msg-wrap bot';
    const bubble = document.createElement("div");
    bubble.className = `bubble ${lang}`;
    const col = document.createElement("div");
    col.className = "bubble-col";
    col.appendChild(bubble);
    const av = document.createElement("div");
    av.className = "avatar";
    av.textContent = "🎗";
    wrap.appendChild(av);
    wrap.appendChild(col);
    chat.appendChild(wrap);
    scrollDown();
    return bubble;
  }

  function appendSuggestions(suggestions, lang) {
    const isAr = lang === 'ar';
    const row = document.createElement('div');
    row.className = 'suggestions-row' + (isAr ? ' ar' : '');
    suggestions.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sug-btn' + (isAr ? ' ar' : '');
      btn.textContent = s;
      btn.onclick = () => { input.value = s; sendMessage(); };
      row.appendChild(btn);
    });
    chat.appendChild(row);
    scrollDown();
  }

  function renderMd(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/^[-•] (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*?<\/li>\n?)+/gs, m => `<ul>${m}</ul>`)
      .replace(/\n\n/g, '<br><br>')
      .replace(/\n/g, '<br>')
      .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">🔗 Read more</a>');
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;
    const lang = detectLang(text);

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    isStreaming = true;

    appendUser(text);
    conversationHistory.push({ role: 'user', content: text });
    appendTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: conversationHistory })
      });
      if (!res.ok) throw new Error('err');

      removeTyping();
      const bubble = appendBotStream(lang);
      let fullText = '';

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') break;
          try {
            const { text: chunk } = JSON.parse(payload);
            fullText += chunk;
            bubble.innerHTML = renderMd(fullText) + '<span class="cursor">▍</span>';
            scrollDown();
          } catch {}
        }
      }

      bubble.innerHTML = renderMd(fullText);
      conversationHistory.push({ role: 'assistant', content: fullText });
      fetchSuggestions(fullText, lang);

    } catch {
      removeTyping();
      const w = document.createElement('div');
      w.className = 'msg-wrap bot';
      w.innerHTML = `<div class="avatar">🎗</div><div class="bubble-col"><div class="bubble en" style="color:#e05c8a">⚠️ Connection error. Make sure Flask is running with the Anthropic API key set.</div></div>`;
      chat.appendChild(w);
    }

    isStreaming = false;
    sendBtn.disabled = !input.value.trim();
    scrollDown();
  }

  async function fetchSuggestions(botText, lang) {
    try {
      const res = await fetch('/suggest', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ last_response: botText, language: lang })
      });
      const data = await res.json();
      if (data.suggestions?.length) appendSuggestions(data.suggestions, lang);
    } catch {}
  }

  function scrollDown() {
    chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
